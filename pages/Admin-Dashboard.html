<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt — Admin Dashboard</title>

    <!-- Page Favicon -->
    <link rel="icon" type="image/jpeg" href="../images/findit.jpeg">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ==========================================================================
           GLOBAL VARIABLES & LIGHT/DARK THEME DEFINITIONS
           ========================================================================== */
        :root {
            --primary-purple: #5b46f6;
            --primary-hover: #4a35e0;
            --bg-body: #f8fafc;
            --bg-nav: #ffffff;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --footer-bg: #090d16;
            --footer-text: #94a3b8;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            
            --status-pending-bg: #fef3c7;
            --status-pending-text: #d97706;
            --status-active-bg: #dbeafe;
            --status-active-text: #2563eb;
            --status-resolved-bg: #dcfce7;
            --status-resolved-text: #15803d;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-nav: #1e293b;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);

            --status-pending-bg: rgba(217, 119, 6, 0.2);
            --status-pending-text: #fbbf24;
            --status-active-bg: rgba(37, 99, 235, 0.2);
            --status-active-text: #60a5fa;
            --status-resolved-bg: rgba(21, 128, 61, 0.2);
            --status-resolved-text: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-purple);
        }

        .navbar-brand img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
            background-color: #ffffff;
            padding: 2px;
            border: 1px solid var(--border-color);
        }

        .admin-badge {
            background: var(--primary-purple);
            color: #ffffff;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-theme-toggle {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.88rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            color: var(--text-main);
            background: transparent;
        }

        .btn-outline:hover {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .btn-success {
            background-color: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background-color: #16a34a;
        }

        /* MAIN DASHBOARD */
        .dashboard-container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 8%;
            width: 100%;
            flex: 1;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dashboard-header h1 {
            font-size: 2rem;
            font-weight: 800;
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 22px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-info p {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(91, 70, 246, 0.1);
            color: var(--primary-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        /* CONTROLS */
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            min-width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        /* DATA TABLE */
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: var(--card-shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: rgba(0, 0, 0, 0.02);
            color: var(--text-muted);
            padding: 16px 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
        }

        .badge-type-lost { background: #fee2e2; color: #b91c1c; }
        .badge-type-found { background: #dcfce7; color: #15803d; }

        .badge-status-pending { background: var(--status-pending-bg); color: var(--status-pending-text); }
        .badge-status-active { background: var(--status-active-bg); color: var(--status-active-text); }
        .badge-status-resolved { background: var(--status-resolved-bg); color: var(--status-resolved-text); }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btns button {
            padding: 6px 10px;
            font-size: 0.8rem;
        }

        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .no-data i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
            color: var(--primary-purple);
        }

        /* FOOTER */
        .site-footer {
            background-color: var(--footer-bg);
            color: #ffffff;
            padding: 25px 8%;
            margin-top: auto;
            text-align: center;
            font-size: 0.85rem;
            border-top: 1px solid #1e293b;
        }

        @media (max-width: 768px) {
            .table-controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <!-- ===================== NAVBAR ===================== -->
    <header class="navbar">
        <a href="../index.html" class="navbar-brand">
            <img src="../images/findit.jpeg" alt="FindIt Logo" onerror="this.src='https://via.placeholder.com/40'">
            <span>FindIt</span>
            <span class="admin-badge">Admin</span>
        </a>

        <div class="nav-actions">
            <button onclick="toggleTheme()" class="btn-theme-toggle" id="themeToggleBtn" title="Toggle Light/Dark Theme">
                <i id="themeToggleIcon" class="fa-solid fa-moon"></i>
            </button>
            <a href="../index.html" class="btn btn-outline"><i class="fa-solid fa-house"></i> Home Page</a>
            <button onclick="handleLogout()" class="btn btn-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </header>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>Admin Control Panel</h1>
                <p style="color: var(--text-muted); margin-top: 4px;">Live tracking of all user submissions from Report Lost & Report Found forms.</p>
            </div>
            <button onclick="loadAdminData()" class="btn btn-outline"><i class="fa-solid fa-rotate-right"></i> Refresh Data</button>
        </div>

        <!-- STATS CARDS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Reports</h3>
                    <p id="statTotal">0</p>
                </div>
                <div class="stat-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>Lost Items</h3>
                    <p id="statLost">0</p>
                </div>
                <div class="stat-icon" style="background: rgba(217, 119, 6, 0.1); color: #d97706;"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>Found Items</h3>
                    <p id="statFound">0</p>
                </div>
                <div class="stat-icon" style="background: rgba(37, 99, 235, 0.1); color: #2563eb;"><i class="fa-solid fa-box-open"></i></div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>Recovered</h3>
                    <p id="statResolved">0</p>
                </div>
                <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22c55e;"><i class="fa-solid fa-circle-check"></i></div>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="table-controls">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search by title or location..." onkeyup="filterTable()">
            </div>

            <div style="display: flex; gap: 10px;">
                <select class="filter-select" id="typeFilter" onchange="filterTable()">
                    <option value="ALL">All Types</option>
                    <option value="Lost">Lost Only</option>
                    <option value="Found">Found Only</option>
                </select>

                <select class="filter-select" id="statusFilter" onchange="filterTable()">
                    <option value="ALL">All Statuses</option>
                    <option value="PENDING">Pending</option>
                    <option value="ACTIVE">Active</option>
                    <option value="RESOLVED">Recovered</option>
                </select>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Item Details</th>
                        <th>Type</th>
                        <th>Location</th>
                        <th>Date Reported</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <!-- Dynamic Rows Rendered From LocalStorage Here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="site-footer">
        &copy; 2026 FindIt Campus Management Portal.
    </footer>

    <!-- ===================== SCRIPT ===================== -->
    <script>
        // ===== INITIALIZE PAGE =====
        document.addEventListener('DOMContentLoaded', () => {
            loadAdminData();
            initializeTheme();
        });

        // ===== THEME TOGGLE =====
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('findit_theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function initializeTheme() {
            const savedTheme = localStorage.getItem('findit_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeToggleIcon');
            icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        // ===== LOAD AND DISPLAY DATA =====
        function loadAdminData() {
            const allReports = JSON.parse(localStorage.getItem('findit_all_reports')) || [];
            
            // Calculate stats
            const stats = {
                total: allReports.length,
                lost: allReports.filter(r => r.type === 'Lost').length,
                found: allReports.filter(r => r.type === 'Found').length,
                resolved: allReports.filter(r => r.status === 'RESOLVED').length
            };

            // Update stat cards
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statLost').textContent = stats.lost;
            document.getElementById('statFound').textContent = stats.found;
            document.getElementById('statResolved').textContent = stats.resolved;

            // Render table
            renderTable(allReports);
        }

        // ===== RENDER TABLE =====
        function renderTable(reports) {
            const tbody = document.getElementById('adminTableBody');
            
            if (reports.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="no-data">
                            <i class="fa-solid fa-inbox"></i>
                            <p><strong>No User Reports Found</strong></p>
                            <p>When users submit items on the "Report Lost" or "Report Found" pages, they will appear here automatically.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = reports.map(report => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <i class="fa-solid ${report.icon}" style="font-size: 1.2rem; color: ${report.type === 'Lost' ? '#ef4444' : '#10b981'};"></i>
                            <div>
                                <strong>${report.itemName}</strong>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">
                                    ${report.userName} • ${report.dept}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge badge-type-${report.type === 'Lost' ? 'lost' : 'found'}">
                            ${report.type}
                        </span>
                    </td>
                    <td>${report.location}</td>
                    <td>${new Date(report.createdAt).toLocaleDateString()}</td>
                    <td>
                        <span class="badge badge-status-${report.status.toLowerCase()}">
                            ${report.status}
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-success" onclick="markResolved('${report.id}')">✓ Resolve</button>
                            <button class="btn btn-danger" onclick="deleteReport('${report.id}')">✕ Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ===== FILTER TABLE =====
        function filterTable() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            let allReports = JSON.parse(localStorage.getItem('findit_all_reports')) || [];

            allReports = allReports.filter(report => {
                const matchesSearch = report.itemName.toLowerCase().includes(searchQuery) || 
                                    report.location.toLowerCase().includes(searchQuery);
                const matchesType = typeFilter === 'ALL' || report.type === typeFilter;
                const matchesStatus = statusFilter === 'ALL' || report.status === statusFilter;

                return matchesSearch && matchesType && matchesStatus;
            });

            renderTable(allReports);
        }

        // ===== MARK AS RESOLVED =====
        function markResolved(reportId) {
            let allReports = JSON.parse(localStorage.getItem('findit_all_reports')) || [];
            const report = allReports.find(r => r.id === reportId);

            if (report) {
                report.status = 'RESOLVED';
                localStorage.setItem('findit_all_reports', JSON.stringify(allReports));
                loadAdminData();
                alert('✅ Item marked as Recovered!');
            }
        }

        // ===== DELETE REPORT =====
        function deleteReport(reportId) {
            if (confirm('⚠️ Are you sure you want to delete this report?')) {
                let allReports = JSON.parse(localStorage.getItem('findit_all_reports')) || [];
                allReports = allReports.filter(r => r.id !== reportId);
                localStorage.setItem('findit_all_reports', JSON.stringify(allReports));
                loadAdminData();
                alert('🗑️ Report deleted successfully!');
            }
        }

        // ===== LOGOUT =====
        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('findit_logged_user');
                window.location.href = 'Login.html';
            }
        }
    </script>
</body>
</html>
